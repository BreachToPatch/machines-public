DocumentRoot "/usr/local/apache2/htdocs"

# -----------------------------------------------------------------------
# VULNERABLE BLOCK — This is the misconfiguration that enables the exploit.
#
# "Require all granted" on the root directory combined with the path
# normalization bug in Apache 2.4.49 allows an attacker to traverse outside
# the document root using URL-encoded dots (%2e).
# -----------------------------------------------------------------------
<Directory />
    AllowOverride none
    Require all denied  # Changed from "Require all granted" to "Require all denied"
</Directory>

<Directory "/usr/local/apache2/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# CGI-BIN — required for the RCE part of CVE-2021-41773
