name: Validate PWN Submission

# Triggers when a player opens or updates a PR adding files in writeups/attack/.
#
# Required branch name convention: attack/{github-username}/{machine-name}
# Example: attack/alice/vuln-apache-path-traversal
#
# Expected PR structure (player submits only their own folder):
#   {machine}/writeups/attack/{github-username}/writeup.md
#   {machine}/writeups/attack/{github-username}/exploit.py
#
# Security checks:
#   - Branch name must follow the convention attack/{username}/{machine}
#   - Folder name must match the PR author's GitHub username
#   - PR must only touch files inside the player's own folder
#
# Versioning:
#   - Each machine has an accepted_hashes.json listing all valid flag hashes
#   - Only a pwn against the CURRENT version can trigger First Blood and archiving
#   - A pwn against an older (but non-retired) version is still awarded 50 pts
#     but does NOT lock an exploit or trigger the archive workflow
#
# On first blood (current version only):
#   - The exploit is automatically copied to exploit/exploit.py and locked
#   - The archive workflow in btop-sources is triggered to publish sanitized sources

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '*/writeups/attack/**'

permissions:
  pull-requests: write
  contents: write        # needed to commit the locked exploit.py on first blood
  packages: read         # needed to pull from ghcr.io

jobs:
  validate-pwn:
    name: Validate PWN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # STEP 1 — Verify branch name follows the convention
      # Required format: attack/{username}/{machine-name}
      # -----------------------------------------------------------------------
      - name: Verify branch name convention
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch name: $BRANCH"

          # Check format: must start with "attack/"
          if [[ ! "$BRANCH" =~ ^attack/[^/]+/[^/]+$ ]]; then
            echo "Invalid branch name: '$BRANCH'"
            echo ""
            echo "Your branch must follow this convention:"
            echo "  attack/{your-github-username}/{machine-name}"
            echo ""
            echo "Examples:"
            echo "  attack/alice/vuln-apache-path-traversal"
            echo "  attack/bob/vuln-apache-path-traversal"
            exit 1
          fi

          # Extract username and machine from branch name
          BRANCH_USERNAME=$(echo "$BRANCH" | cut -d'/' -f2)
          BRANCH_MACHINE=$(echo "$BRANCH"  | cut -d'/' -f3)

          echo "branch_username=$BRANCH_USERNAME" >> $GITHUB_OUTPUT
          echo "branch_machine=$BRANCH_MACHINE"   >> $GITHUB_OUTPUT
          echo "Branch convention check passed — user: $BRANCH_USERNAME, machine: $BRANCH_MACHINE"

      # -----------------------------------------------------------------------
      # STEP 2 — Detect machine and player username from changed file paths
      # Expected path: {machine}/writeups/attack/{username}/exploit.py
      # -----------------------------------------------------------------------
      - name: Detect machine and player
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          EXPLOIT_PATH=$(echo "$CHANGED" \
            | grep -E '^[^/]+/writeups/attack/[^/]+/exploit\.py$' \
            | head -1)

          if [ -z "$EXPLOIT_PATH" ]; then
            echo "is_pwn_pr=false" >> $GITHUB_OUTPUT
            echo "No exploit.py found in writeups/attack/ — skipping."
            exit 0
          fi

          MACHINE=$(echo "$EXPLOIT_PATH"   | cut -d'/' -f1)
          USERNAME=$(echo "$EXPLOIT_PATH"  | cut -d'/' -f4)
          PLAYER_DIR="${MACHINE}/writeups/attack/${USERNAME}"

          echo "is_pwn_pr=true"          >> $GITHUB_OUTPUT
          echo "machine=$MACHINE"        >> $GITHUB_OUTPUT
          echo "username=$USERNAME"      >> $GITHUB_OUTPUT
          echo "player_dir=$PLAYER_DIR"  >> $GITHUB_OUTPUT
          echo "Detected: machine=$MACHINE, player=$USERNAME"

      # -----------------------------------------------------------------------
      # STEP 3 — Cross-check branch username vs folder username vs PR author
      # Prevents submitting on behalf of another player
      # -----------------------------------------------------------------------
      - name: Cross-check identity
        if: steps.detect.outputs.is_pwn_pr == 'true'
        run: |
          BRANCH_USER="${{ steps.branch.outputs.branch_username }}"
          FOLDER_USER="${{ steps.detect.outputs.username }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"

          echo "Branch username: $BRANCH_USER"
          echo "Folder username: $FOLDER_USER"
          echo "PR author:       $PR_AUTHOR"

          if [ "$BRANCH_USER" != "$FOLDER_USER" ]; then
            echo "Mismatch: branch username ($BRANCH_USER) differs from folder username ($FOLDER_USER)."
            exit 1
          fi

          if [ "$BRANCH_USER" != "$PR_AUTHOR" ]; then
            echo "Mismatch: branch username ($BRANCH_USER) differs from PR author ($PR_AUTHOR)."
            echo "You must submit under your own GitHub username."
            exit 1
          fi

          echo "Identity check passed."

      # -----------------------------------------------------------------------
      # STEP 4 — Check that both required files are present
      # -----------------------------------------------------------------------
      - name: Check required files
        if: steps.detect.outputs.is_pwn_pr == 'true'
        run: |
          PLAYER_DIR="${{ steps.detect.outputs.player_dir }}"
          ERRORS=""

          if [ ! -f "${PLAYER_DIR}/exploit.py" ]; then
            ERRORS="${ERRORS}\n- Missing: \`${PLAYER_DIR}/exploit.py\`"
          fi

          if [ ! -f "${PLAYER_DIR}/writeup.md" ]; then
            ERRORS="${ERRORS}\n- Missing: \`${PLAYER_DIR}/writeup.md\`"
          fi

          if [ -n "$ERRORS" ]; then
            echo -e "Required files missing:${ERRORS}"
            exit 1
          fi

          echo "All required files present."

      # -----------------------------------------------------------------------
      # STEP 5 — Verify the PR only touches the player's own folder
      # Rejects PRs that modify files outside writeups/attack/{username}/
      # -----------------------------------------------------------------------
      - name: Verify PR scope
        if: steps.detect.outputs.is_pwn_pr == 'true'
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"
          USERNAME="${{ steps.detect.outputs.username }}"
          ALLOWED_PREFIX="${MACHINE}/writeups/attack/${USERNAME}/"

          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          VIOLATIONS=$(echo "$CHANGED" | grep -v "^${ALLOWED_PREFIX}" || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "PR touches files outside your allowed folder:"
            echo "$VIOLATIONS"
            echo ""
            echo "Your PR must only add files inside: ${ALLOWED_PREFIX}"
            exit 1
          fi

          echo "Scope check passed — all changes are within the allowed folder."

      # -----------------------------------------------------------------------
      # STEP 6 — Read accepted_hashes.json for this machine
      #
      # Replaces the old single-hash extraction from README.md.
      # accepted_hashes.json lists all valid flag hashes across versions.
      # The CI accepts any non-retired hash, but only a pwn against the
      # current_version can trigger First Blood and the archive workflow.
      # -----------------------------------------------------------------------
      - name: Read accepted hashes
        if: steps.detect.outputs.is_pwn_pr == 'true'
        id: hash
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"
          HASHES_FILE="${MACHINE}/accepted_hashes.json"

          if [ ! -f "$HASHES_FILE" ]; then
            echo "ERROR: $HASHES_FILE not found."
            echo "This file is required and must list all valid flag hashes for this machine."
            exit 1
          fi

          # Extract the hash of the current version (First Blood candidate)
          CURRENT_HASH=$(python3 - <<'PYEOF'
          import json, sys
          with open("$MACHINE/accepted_hashes.json") as f:
              data = json.load(f)
          current = data["current_version"]
          for v in data["versions"]:
              if v["version"] == current and not v.get("retired", False):
                  print(v["flag_sha256"])
                  sys.exit(0)
          print("")   # no current version found — will cause rejection downstream
          PYEOF
                    )

                    # Extract all non-retired hashes as a space-separated list
                    ALL_VALID_HASHES=$(python3 - <<'PYEOF'
          import json
          with open("$MACHINE/accepted_hashes.json") as f:
              data = json.load(f)
          valid = [v["flag_sha256"] for v in data["versions"] if not v.get("retired", False)]
          print(" ".join(valid))
          PYEOF
          )

          if [ -z "$CURRENT_HASH" ]; then
            echo "ERROR: Could not find a non-retired current version hash in $HASHES_FILE"
            exit 1
          fi

          echo "current_hash=$CURRENT_HASH"       >> $GITHUB_OUTPUT
          echo "all_valid_hashes=$ALL_VALID_HASHES" >> $GITHUB_OUTPUT
          echo "Current version hash: $CURRENT_HASH"
          echo "All valid hashes:     $ALL_VALID_HASHES"

      # -----------------------------------------------------------------------
      # STEP 7 — Check first blood status
      # First blood = no locked exploit.py exists yet for this machine
      # -----------------------------------------------------------------------
      - name: Check first blood status
        if: steps.detect.outputs.is_pwn_pr == 'true'
        id: firstblood
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"

          if [ -f "${MACHINE}/exploit/exploit.py" ]; then
            echo "is_first_blood=false" >> $GITHUB_OUTPUT
            echo "First blood already taken — this is a subsequent pwn."
          else
            echo "is_first_blood=true" >> $GITHUB_OUTPUT
            echo "No locked exploit found — this could be the first blood."
          fi

      # -----------------------------------------------------------------------
      # STEP 8 — Pull the private CI image and start the vulnerable services
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: steps.detect.outputs.is_pwn_pr == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PULL_TOKEN }}

      - name: Start Docker services
        if: steps.detect.outputs.is_pwn_pr == 'true'
        id: services
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"
          docker compose -f "${MACHINE}/ci/docker-compose.yml" up -d

          echo "Waiting for services to be ready..."
          for i in $(seq 1 6); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 http://localhost:80/ || echo "000")

            if [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "403" ]]; then
              echo "Service is UP (HTTP $HTTP_CODE) after attempt $i"
              echo "status=up" >> $GITHUB_OUTPUT
              break
            fi

            echo "Attempt $i/6 — HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done

          if ! grep -q "status=up" "$GITHUB_OUTPUT"; then
            echo "Service did not become ready in time."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # STEP 9 — Run the player's exploit script
      # -----------------------------------------------------------------------
      - name: Run exploit script
        if: steps.detect.outputs.is_pwn_pr == 'true'
        id: exploit
        run: |
          PLAYER_DIR="${{ steps.detect.outputs.player_dir }}"

          set +e
          STDOUT=$(TARGET_IP=localhost TARGET_PORT=80 \
            python3 "${PLAYER_DIR}/exploit.py" 2>/tmp/exploit_stderr)
          EXIT_CODE=$?
          STDERR=$(cat /tmp/exploit_stderr)
          set -e

          echo "Exit code: $EXIT_CODE"
          echo "Stdout:    $STDOUT"
          echo "Stderr:    $STDERR"

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          {
            echo "stdout<<BTOP_EOF"
            echo "$STDOUT"
            echo "BTOP_EOF"
          } >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # STEP 10 — Verify the flag hash
      #
      # Checks the submitted flag against ALL non-retired hashes in
      # accepted_hashes.json. Also determines whether the flag belongs to
      # the current version — required for First Blood and archive trigger.
      # -----------------------------------------------------------------------
      - name: Verify flag hash
        if: steps.detect.outputs.is_pwn_pr == 'true'
        id: verify
        run: |
          EXIT_CODE="${{ steps.exploit.outputs.exit_code }}"
          STDOUT="${{ steps.exploit.outputs.stdout }}"
          CURRENT_HASH="${{ steps.hash.outputs.current_hash }}"
          ALL_VALID="${{ steps.hash.outputs.all_valid_hashes }}"

          # Exit code must be 0 for the exploit to be considered successful
          if [ "$EXIT_CODE" != "0" ]; then
            echo "result=rejected"           >> $GITHUB_OUTPUT
            echo "is_current_version=false"  >> $GITHUB_OUTPUT
            echo "reason=Exploit script returned exit code \`$EXIT_CODE\` — flag was not obtained." \
              >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract the flag from stdout
          FLAG_VALUE=$(echo "$STDOUT" \
            | grep 'FLAG_OBTAINED:' \
            | sed 's/FLAG_OBTAINED://' \
            | tr -d '[:space:]')

          if [ -z "$FLAG_VALUE" ]; then
            echo "result=rejected"           >> $GITHUB_OUTPUT
            echo "is_current_version=false"  >> $GITHUB_OUTPUT
            echo "reason=No \`FLAG_OBTAINED:\` line found in exploit output." \
              >> $GITHUB_OUTPUT
            exit 0
          fi

          # Compute the SHA-256 of the submitted flag
          ACTUAL=$(echo -n "$FLAG_VALUE" | sha256sum | cut -d' ' -f1)
          echo "Submitted flag hash: $ACTUAL"
          echo "Current version hash: $CURRENT_HASH"
          echo "All valid hashes:     $ALL_VALID"

          # Check against all non-retired hashes
          if echo "$ALL_VALID" | tr ' ' '\n' | grep -qx "$ACTUAL"; then
            echo "result=validated"  >> $GITHUB_OUTPUT
            echo "flag=$FLAG_VALUE"  >> $GITHUB_OUTPUT

            # Is it the current version? Required for First Blood + archive
            if [ "$ACTUAL" = "$CURRENT_HASH" ]; then
              echo "is_current_version=true"  >> $GITHUB_OUTPUT
              echo "Flag matches current version."
            else
              echo "is_current_version=false" >> $GITHUB_OUTPUT
              echo "Flag matches an older (non-retired) version — not eligible for First Blood."
            fi
          else
            echo "result=rejected"           >> $GITHUB_OUTPUT
            echo "is_current_version=false"  >> $GITHUB_OUTPUT
            echo "reason=Flag hash does not match any accepted version. Double-check the flag value in your writeup." \
              >> $GITHUB_OUTPUT
          fi

      # -----------------------------------------------------------------------
      # STEP 11 — On first blood (current version only): lock the exploit
      #
      # Only runs when:
      #   - The pwn is validated
      #   - No locked exploit exists yet (is_first_blood == true)
      #   - The flag matches the CURRENT version (is_current_version == true)
      #
      # A pwn against an older version earns points but does NOT lock an
      # exploit and does NOT trigger archiving.
      # -----------------------------------------------------------------------
      - name: Lock exploit on first blood
        if: |
          steps.detect.outputs.is_pwn_pr == 'true' &&
          steps.verify.outputs.result == 'validated' &&
          steps.firstblood.outputs.is_first_blood == 'true' &&
          steps.verify.outputs.is_current_version == 'true'
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"
          PLAYER_DIR="${{ steps.detect.outputs.player_dir }}"
          USERNAME="${{ steps.detect.outputs.username }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p "${MACHINE}/exploit"
          cp "${PLAYER_DIR}/exploit.py" "${MACHINE}/exploit/exploit.py"

          # Add a header identifying the first blood author
          HEADER="# Locked by CI on first blood — submitted by @${USERNAME}\n"
          sed -i "1s|^|${HEADER}|" "${MACHINE}/exploit/exploit.py"

          git add "${MACHINE}/exploit/exploit.py"
          git commit -m "ci: lock exploit for ${MACHINE} — first blood by @${USERNAME} [skip ci]"
          git push origin HEAD:${{ github.head_ref }}

          echo "Exploit locked at ${MACHINE}/exploit/exploit.py"

      # -----------------------------------------------------------------------
      # STEP 12 — On first blood (current version only): trigger archive workflow
      #
      # Fires a workflow_dispatch event in btop-sources/machines-sources to:
      #   1. Sanitize the private sources (remove flag value, remove reference exploit)
      #   2. Push the sanitized folder to BreachToPatch/machines-archive
      #
      # Uses ARCHIVE_TRIGGER_TOKEN — a PAT with repo+workflow scope on btop-sources.
      # continue-on-error: true so that an archive failure never blocks the pwn.
      # The pwn is already validated and the exploit locked at this point.
      # -----------------------------------------------------------------------
      - name: Trigger archive workflow in btop-sources
        if: |
          steps.detect.outputs.is_pwn_pr == 'true' &&
          steps.verify.outputs.result == 'validated' &&
          steps.firstblood.outputs.is_first_blood == 'true' &&
          steps.verify.outputs.is_current_version == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ARCHIVE_TRIGGER_TOKEN }}
          script: |
            const machine  = '${{ steps.detect.outputs.machine }}';
            const username = '${{ steps.detect.outputs.username }}';
            const prUrl    = context.payload.pull_request.html_url;

            // Map public slug → internal machine folder name.
            // Add entries here as new machines are added.
            const slugToFolder = {
              'vuln-apache-path-traversal': 'bee-path',
            };

            const machineName = slugToFolder[machine];
            if (!machineName) {
              core.warning(`No internal folder mapping found for slug "${machine}". Archive not triggered.`);
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner:       'btop-sources',
              repo:        'machines-sources',
              workflow_id: 'archive-machine.yml',
              ref:         'main',
              inputs: {
                machine_name:    machineName,
                machine_slug:    machine,
                version:         'v1',
                pr_url:          prUrl,
                first_blood_by:  username,
              }
            });

            console.log(`Archive workflow dispatched for ${machine} (${machineName}) v1`);

      # -----------------------------------------------------------------------
      # STEP 13 — Post result comment on the PR
      #
      # Covers all cases:
      #   - Validated, first blood on current version  → 100 pts + sources unlocked
      #   - Validated, subsequent pwn on current version → 50 pts + whitebox notice
      #   - Validated, pwn on older version              → 50 pts + older version notice
      #   - Rejected                                     → reason + fix instructions
      # -----------------------------------------------------------------------
      - name: Post result comment on PR
        if: steps.detect.outputs.is_pwn_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const result           = '${{ steps.verify.outputs.result }}';
            const machine          = '${{ steps.detect.outputs.machine }}';
            const username         = '${{ steps.detect.outputs.username }}';
            const reason           = `${{ steps.verify.outputs.reason }}`;
            const isFirstBlood     = '${{ steps.firstblood.outputs.is_first_blood }}' === 'true';
            const isCurrentVersion = '${{ steps.verify.outputs.is_current_version }}' === 'true';
            const validated        = result === 'validated';

            const archiveUrl =
              `https://github.com/BreachToPatch/machines-archive`;

            let body;

            if (validated) {
              // ── Determine points and badge line ──────────────────────────
              let badgeLine;

              if (isFirstBlood && isCurrentVersion) {
                // Best case: first ever pwn on the current version
                badgeLine = [
                  `> 🩸 **First Blood!** You are the first player to pwn this machine.`,
                  `> Your exploit has been locked as the regression test for all future patches.`,
                  `> The source code is now being published to [machines-archive](${archiveUrl}) for Blue Teamers.`,
                  `> **+100 pts**`,
                ].join('\n');

              } else if (!isFirstBlood && isCurrentVersion) {
                // Subsequent pwn on the current version — whitebox notice
                badgeLine = [
                  `> ⚔️ **Subsequent pwn.** Well played — +50 pts.`,
                  `> 💡 **Whitebox available:** The source code for this machine is public.`,
                  `> You can study the original implementation at [machines-archive](${archiveUrl}).`,
                ].join('\n');

              } else {
                // Pwn on an older (non-retired) version
                badgeLine = [
                  `> ⚔️ **Older version pwn — +50 pts.**`,
                  `> ℹ️ You exploited a previous version of this machine.`,
                  `> The current version may have a different flag — check the machine README for the latest hash.`,
                  `> 💡 **Whitebox available:** Sources are at [machines-archive](${archiveUrl}).`,
                ].join('\n');
              }

              body = `## 🐝 BtoP — PWN Validation: ✅ ACCEPTED

            **Machine:** \`${machine}\`
            **Player:** @${username}

            Your exploit ran successfully and the flag hash matches.
            A maintainer will review your writeup and merge this PR.

            ${badgeLine}`;

                        } else {
                          // ── Rejected ─────────────────────────────────────────────────
                          body = `## 🐝 BtoP — PWN Validation: ❌ REJECTED

            **Machine:** \`${machine}\`
            **Player:** @${username}

            **Reason:** ${reason}

            **Common fixes:**
            - Branch must be named \`attack/${username}/${machine}\`
            - Make sure your script works with \`TARGET_IP=localhost TARGET_PORT=80\`
            - Your script must print \`FLAG_OBTAINED:FLAG{...}\` to stdout and exit with code \`0\`
            - Verify the flag hash: \`echo -n "FLAG{...}" | sha256sum\`
            - Make sure you are submitting the flag from the current version of the machine

            See the [Red Team Guide](https://github.com/BreachToPatch/docs/blob/main/GUIDE_REDTEAM.md) for full instructions.`;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body
            });

      # -----------------------------------------------------------------------
      # STEP 14 — Always clean up Docker services
      # -----------------------------------------------------------------------
      - name: Stop Docker services
        if: always() && steps.detect.outputs.is_pwn_pr == 'true'
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"
          docker compose -f "${MACHINE}/ci/docker-compose.yml" down --volumes 2>/dev/null || true