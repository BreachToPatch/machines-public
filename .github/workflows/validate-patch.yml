name: Validate Patch Submission

# Triggers when a Blue Teamer opens a PR adding files in writeups/patch/.
#
# Expected PR structure (player submits only their own folder):
#   writeups/patch/{github-username}/writeup.md
#   writeups/patch/{github-username}/docker-compose.yml
#   writeups/patch/{github-username}/<any other patched files>
#
# Security: the CI verifies that the folder name matches the PR author's GitHub username.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '*/writeups/patch/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-patch:
    name: Validate Patch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # STEP 1 — Detect machine and patch author
      # Expected path: {machine}/writeups/patch/{username}/docker-compose.yml
      # -----------------------------------------------------------------------
      - name: Detect machine and patch author
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          PATCH_PATH=$(echo "$CHANGED" \
            | grep -E '^[^/]+/writeups/patch/[^/]+/' \
            | head -1)

          if [ -z "$PATCH_PATH" ]; then
            echo "is_patch_pr=false" >> $GITHUB_OUTPUT
            echo "No patch files detected — skipping."
            exit 0
          fi

          MACHINE=$(echo "$PATCH_PATH"  | cut -d'/' -f1)
          USERNAME=$(echo "$PATCH_PATH" | cut -d'/' -f4)
          PATCH_DIR="${MACHINE}/writeups/patch/${USERNAME}"

          echo "machine=$MACHINE"     >> $GITHUB_OUTPUT
          echo "username=$USERNAME"   >> $GITHUB_OUTPUT
          echo "patch_dir=$PATCH_DIR" >> $GITHUB_OUTPUT
          echo "is_patch_pr=true"     >> $GITHUB_OUTPUT
          echo "Machine: $MACHINE | Patch author: $USERNAME"

      # -----------------------------------------------------------------------
      # STEP 2 — Verify folder ownership
      # -----------------------------------------------------------------------
      - name: Verify folder ownership
        if: steps.detect.outputs.is_patch_pr == 'true'
        run: |
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          FOLDER_NAME="${{ steps.detect.outputs.username }}"

          echo "PR author:   $PR_AUTHOR"
          echo "Folder name: $FOLDER_NAME"

          if [ "$PR_AUTHOR" != "$FOLDER_NAME" ]; then
            echo "Ownership mismatch: @${PR_AUTHOR} tried to submit in folder '${FOLDER_NAME}'."
            echo "Your folder must be named exactly after your GitHub username."
            exit 1
          fi

          echo "Ownership check passed."

      # -----------------------------------------------------------------------
      # STEP 3 — Verify the PR only touches the player's own folder
      # -----------------------------------------------------------------------
      - name: Verify PR scope
        if: steps.detect.outputs.is_patch_pr == 'true'
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"
          USERNAME="${{ steps.detect.outputs.username }}"
          ALLOWED_PREFIX="${MACHINE}/writeups/patch/${USERNAME}/"

          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          VIOLATIONS=$(echo "$CHANGED" | grep -v "^${ALLOWED_PREFIX}" || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "PR touches files outside your allowed folder:"
            echo "$VIOLATIONS"
            echo ""
            echo "Your PR must only add files inside: ${ALLOWED_PREFIX}"
            exit 1
          fi

          echo "Scope check passed."

      # -----------------------------------------------------------------------
      # STEP 4 — Check that all required files are present
      # -----------------------------------------------------------------------
      - name: Check required files
        if: steps.detect.outputs.is_patch_pr == 'true'
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"
          PATCH_DIR="${{ steps.detect.outputs.patch_dir }}"
          ERRORS=""

          if [ ! -f "${PATCH_DIR}/writeup.md" ]; then
            ERRORS="${ERRORS}\n- Missing: \`${PATCH_DIR}/writeup.md\`"
          fi

          if [ ! -f "${PATCH_DIR}/docker-compose.yml" ]; then
            ERRORS="${ERRORS}\n- Missing: \`${PATCH_DIR}/docker-compose.yml\`"
          fi

          # The locked exploit MUST exist — machine must have been pwned first
          if [ ! -f "${MACHINE}/exploit/exploit.py" ]; then
            ERRORS="${ERRORS}\n- Cannot validate patch: no locked \`exploit/exploit.py\` found."
            ERRORS="${ERRORS}\n  The machine must be pwned at least once before patches can be submitted."
          fi

          if [ -n "$ERRORS" ]; then
            echo -e "Required files missing:${ERRORS}"
            exit 1
          fi

          echo "All required files present."

      # -----------------------------------------------------------------------
      # STEP 5 — Scan the patch for accidentally committed secrets
      # -----------------------------------------------------------------------
      - name: Scan patch for secrets
        if: steps.detect.outputs.is_patch_pr == 'true'
        id: secrets_scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ${{ steps.detect.outputs.patch_dir }}
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
        continue-on-error: true

      - name: Fail if secrets were found
        if: steps.detect.outputs.is_patch_pr == 'true' && steps.secrets_scan.outcome == 'failure'
        run: |
          echo "TruffleHog detected secrets in the patch files. PR rejected."
          exit 1

      # -----------------------------------------------------------------------
      # STEP 6 — Build and start the patched Docker services
      # The patch files live in writeups/patch/{username}/
      # The flag is injected via secret for the regression test.
      # -----------------------------------------------------------------------
      - name: Build and start patched Docker services
        if: steps.detect.outputs.is_patch_pr == 'true'
        id: services
        env:
          FLAG_VALUE: ${{ secrets.BEE_PATH_FLAG }}
        run: |
          PATCH_DIR="${{ steps.detect.outputs.patch_dir }}"

          docker compose -f "${PATCH_DIR}/docker-compose.yml" build \
            --build-arg FLAG_VALUE="$FLAG_VALUE"

          docker compose -f "${PATCH_DIR}/docker-compose.yml" up -d

          echo "Waiting for services to be ready..."
          for i in $(seq 1 6); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 http://localhost:80/ || echo "000")

            if [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "403" ]]; then
              echo "Service is UP (HTTP $HTTP_CODE)"
              echo "status=up" >> $GITHUB_OUTPUT
              break
            fi

            echo "Attempt $i/6 — HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done

          if ! grep -q "status=up" "$GITHUB_OUTPUT"; then
            echo "Service did not start — SLA violation."
            echo "status=down" >> $GITHUB_OUTPUT
            exit 1
          fi

      # -----------------------------------------------------------------------
      # STEP 7 — SLA health check
      # -----------------------------------------------------------------------
      - name: SLA health check
        if: steps.detect.outputs.is_patch_pr == 'true'
        id: sla
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"

          if [ -f "${MACHINE}/tests/health_check.sh" ]; then
            TARGET_IP=localhost TARGET_PORT=80 bash "${MACHINE}/tests/health_check.sh"
          else
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/)
            if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "403" ]]; then
              echo "SLA check failed: HTTP $HTTP_CODE"
              exit 1
            fi
          fi

          echo "SLA check passed."

      # -----------------------------------------------------------------------
      # STEP 8 — Replay the locked exploit against the patched version
      # Exit 1 = good (vulnerability fixed)
      # Exit 0 = bad (patch insufficient)
      # Exit 2 = bad (SLA violation)
      # -----------------------------------------------------------------------
      - name: Run exploit regression test
        if: steps.detect.outputs.is_patch_pr == 'true'
        id: regression
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"

          set +e
          TARGET_IP=localhost TARGET_PORT=80 \
            python3 "${MACHINE}/exploit/exploit.py" 2>/tmp/exploit_stderr
          EXIT_CODE=$?
          set -e

          echo "Exploit exit code: $EXIT_CODE"
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          case $EXIT_CODE in
            0) echo "result=insufficient"  >> $GITHUB_OUTPUT ;;
            1) echo "result=effective"     >> $GITHUB_OUTPUT ;;
            2) echo "result=sla_violation" >> $GITHUB_OUTPUT ;;
            *) echo "result=unknown"       >> $GITHUB_OUTPUT ;;
          esac

      # -----------------------------------------------------------------------
      # STEP 9 — Post result comment on the PR
      # -----------------------------------------------------------------------
      - name: Post result comment on PR
        if: steps.detect.outputs.is_patch_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const machine    = '${{ steps.detect.outputs.machine }}';
            const username   = '${{ steps.detect.outputs.username }}';
            const regression = '${{ steps.regression.outputs.result }}';
            const sla        = '${{ steps.sla.outcome }}';

            let status, detail;

            if (regression === 'effective' && sla === 'success') {
              status = '✅ PATCH ACCEPTED';
              detail = `The exploit was successfully blocked by your patch (exit code \`1\`).
            All services are still responding (SLA check passed).
            A maintainer will review your writeup and merge this PR.
            > This version will become the next release of the machine and reset the Red Team phase.`;
            } else if (regression === 'insufficient') {
              status = '❌ PATCH REJECTED — Vulnerability not fixed';
              detail = `The original exploit still works on your patched version (exit code \`0\`).
            Your patch does not fully neutralize the vulnerability.
            Study the exploit more carefully and try again.`;
            } else if (regression === 'sla_violation' || sla === 'failure') {
              status = '❌ PATCH REJECTED — SLA Violation';
              detail = `One or more services stopped responding after applying your patch.
            A patch must fix the vulnerability **without breaking the existing services**.
            Check that \`docker compose up\` still starts all services correctly.`;
            } else {
              status = '⚠️ VALIDATION ERROR';
              detail = 'An unexpected error occurred during validation. A maintainer will investigate.';
            }

            const body = `## 🐝 BtoP — Patch Validation: ${status}

            **Machine:** \`${machine}\`
            **Patch by:** @${username}

            ${detail}`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body
            });

      # -----------------------------------------------------------------------
      # STEP 10 — Always clean up
      # -----------------------------------------------------------------------
      - name: Stop Docker services
        if: always() && steps.detect.outputs.is_patch_pr == 'true'
        run: |
          PATCH_DIR="${{ steps.detect.outputs.patch_dir }}"
          docker compose -f "${PATCH_DIR}/docker-compose.yml" down --volumes 2>/dev/null || true