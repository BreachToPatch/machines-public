name: Validate Patch Submission

# Triggers when a Blue Teamer opens a PR adding files in writeups/patch/.
#
# This workflow handles STRUCTURAL checks only (branch naming, files, scope,
# secrets scan). The actual security test (exploit regression + flag injection)
# is delegated to validate-patch-private.yml in btop-sources/machines-sources,
# which is the only place that has access to the real flag value.
#
# Required secret (in BreachToPatch/machines-public):
#   PROMOTE_TRIGGER_TOKEN — PAT with workflow scope on btop-sources/machines-sources
#                           Allows dispatching validate-patch-private.yml.
#
# Flow:
#   1. This workflow runs structural checks (steps 1-6)
#   2. Posts a "validation in progress" comment
#   3. Dispatches validate-patch-private.yml with the PR details
#   4. validate-patch-private.yml runs the real test and posts the final result
#   5. Maintainer waits for the private CI result before merging

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '*/writeups/patch/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  structural-checks:
    name: Structural checks + dispatch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # STEP 1 — Verify branch name follows the convention
      # Required format: patch/{username}/{machine-name}
      # -----------------------------------------------------------------------
      - name: Verify branch name convention
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"

          if [[ ! "$BRANCH" =~ ^patch/[^/]+/[^/]+$ ]]; then
            echo "Invalid branch: '$BRANCH'"
            echo "Expected: patch/{your-username}/{machine-name}"
            exit 1
          fi

          echo "branch_username=$(echo "$BRANCH" | cut -d'/' -f2)" >> $GITHUB_OUTPUT
          echo "branch_machine=$(echo "$BRANCH"  | cut -d'/' -f3)" >> $GITHUB_OUTPUT
          echo "Branch OK: $BRANCH"

      # -----------------------------------------------------------------------
      # STEP 2 — Detect machine and patch author from changed file paths
      # -----------------------------------------------------------------------
      - name: Detect machine and patch author
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          PATCH_PATH=$(echo "$CHANGED" \
            | grep -E '^[^/]+/writeups/patch/[^/]+/' \
            | head -1)

          if [ -z "$PATCH_PATH" ]; then
            echo "is_patch_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          MACHINE=$(echo "$PATCH_PATH"  | cut -d'/' -f1)
          USERNAME=$(echo "$PATCH_PATH" | cut -d'/' -f4)

          echo "machine=$MACHINE"                                    >> $GITHUB_OUTPUT
          echo "username=$USERNAME"                                  >> $GITHUB_OUTPUT
          echo "patch_dir=${MACHINE}/writeups/patch/${USERNAME}"     >> $GITHUB_OUTPUT
          echo "is_patch_pr=true"                                    >> $GITHUB_OUTPUT
          echo "Machine: $MACHINE | Author: $USERNAME"

      # -----------------------------------------------------------------------
      # STEP 3 — Cross-check branch, folder, and PR author
      # -----------------------------------------------------------------------
      - name: Cross-check identity
        if: steps.detect.outputs.is_patch_pr == 'true'
        run: |
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          FOLDER_USER="${{ steps.detect.outputs.username }}"
          BRANCH_USER="${{ steps.branch.outputs.branch_username }}"
          FOLDER_MACHINE="${{ steps.detect.outputs.machine }}"
          BRANCH_MACHINE="${{ steps.branch.outputs.branch_machine }}"
          ERRORS=""

          [ "$PR_AUTHOR" != "$FOLDER_USER"   ] && ERRORS="$ERRORS\n- PR author (@${PR_AUTHOR}) ≠ folder name (${FOLDER_USER})"
          [ "$PR_AUTHOR" != "$BRANCH_USER"   ] && ERRORS="$ERRORS\n- PR author (@${PR_AUTHOR}) ≠ branch username (${BRANCH_USER})"
          [ "$FOLDER_MACHINE" != "$BRANCH_MACHINE" ] && ERRORS="$ERRORS\n- Machine in folder (${FOLDER_MACHINE}) ≠ machine in branch (${BRANCH_MACHINE})"

          if [ -n "$ERRORS" ]; then
            echo -e "Identity check failed:$ERRORS"
            exit 1
          fi

          echo "Identity check passed."

      # -----------------------------------------------------------------------
      # STEP 4 — Check required files and structure
      # -----------------------------------------------------------------------
      - name: Check required files
        if: steps.detect.outputs.is_patch_pr == 'true'
        run: |
          MACHINE="${{ steps.detect.outputs.machine }}"
          USERNAME="${{ steps.detect.outputs.username }}"
          PATCH_DIR="${MACHINE}/writeups/patch/${USERNAME}"
          ERRORS=""

          [ ! -f "${PATCH_DIR}/writeup.md"         ] && ERRORS="$ERRORS\n- Missing: \`${PATCH_DIR}/writeup.md\`"
          [ ! -f "${PATCH_DIR}/docker-compose.yml" ] && ERRORS="$ERRORS\n- Missing: \`${PATCH_DIR}/docker-compose.yml\`"
          [ ! -d "${PATCH_DIR}/patch"              ] && ERRORS="$ERRORS\n- Missing: \`${PATCH_DIR}/patch/\` folder (your patched files, mirrors machine structure)"
          [ ! -f "${MACHINE}/exploit/exploit.py"   ] && ERRORS="$ERRORS\n- No locked \`exploit/exploit.py\` — machine must be pwned first"

          if [ -n "$ERRORS" ]; then
            echo -e "Required files missing:$ERRORS"
            exit 1
          fi

          echo "All required files present."

      # -----------------------------------------------------------------------
      # STEP 5 — Verify PR only touches the player's own folder
      # -----------------------------------------------------------------------
      - name: Verify PR scope
        if: steps.detect.outputs.is_patch_pr == 'true'
        run: |
          ALLOWED="${{ steps.detect.outputs.machine }}/writeups/patch/${{ steps.detect.outputs.username }}/"
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          VIOLATIONS=$(echo "$CHANGED" | grep -v "^${ALLOWED}" || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "PR touches files outside your allowed folder:"
            echo "$VIOLATIONS"
            exit 1
          fi

          echo "Scope check passed."

      # -----------------------------------------------------------------------
      # STEP 6 — Scan patch for accidentally committed secrets
      # -----------------------------------------------------------------------
      - name: Scan patch for secrets
        if: steps.detect.outputs.is_patch_pr == 'true'
        id: secrets_scan
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
        continue-on-error: true

      - name: Fail if secrets found
        if: steps.detect.outputs.is_patch_pr == 'true' && steps.secrets_scan.outcome == 'failure'
        run: |
          echo "TruffleHog detected secrets in the patch. PR rejected."
          exit 1

      # -----------------------------------------------------------------------
      # STEP 7 — Post "validation in progress" comment
      # -----------------------------------------------------------------------
      - name: Post in-progress comment
        if: steps.detect.outputs.is_patch_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body: `## 🐝 BtoP — Patch Validation: 🕐 IN PROGRESS

            **Machine:** \`${{ steps.detect.outputs.machine }}\`
            **Patch by:** @${{ steps.detect.outputs.username }}

            Structural checks passed ✅ — the security test is now running in the private CI.
            This involves building your patched Docker image, injecting a validation flag, and replaying the locked exploit.

            Results will be posted here in ~3 minutes.`
            });

      # -----------------------------------------------------------------------
      # STEP 8 — Dispatch validate-patch-private.yml in btop-sources
      # -----------------------------------------------------------------------
      - name: Dispatch private validation workflow
        if: steps.detect.outputs.is_patch_pr == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROMOTE_TRIGGER_TOKEN }}
          script: |
            const machine  = '${{ steps.detect.outputs.machine }}';
            const username = '${{ steps.detect.outputs.username }}';
            const branch   = context.payload.pull_request.head.ref;
            const prNumber = String(context.issue.number);

            // Map public slug → internal machine name
            const slugToName = {
              'vuln-apache-path-traversal': 'bee-path',
            };

            const machineName = slugToName[machine];
            if (!machineName) {
              core.setFailed(`No internal machine name mapping for slug "${machine}"`);
              return;
            }

            // Read the current version from accepted_hashes.json
            const hashesResp = await github.rest.repos.getContent({
              owner: 'BreachToPatch',
              repo:  'machines-public',
              path:  `${machine}/accepted_hashes.json`
            });
            const hashesData = JSON.parse(
              Buffer.from(hashesResp.data.content, 'base64').toString('utf8')
            );
            const currentVersion = hashesData.current_version;

            await github.rest.actions.createWorkflowDispatch({
              owner:       'btop-sources',
              repo:        'machines-sources',
              workflow_id: 'validate-patch-private.yml',
              ref:         'main',
              inputs: {
                machine_name:    machineName,
                machine_slug:    machine,
                current_version: currentVersion,
                pr_number:       prNumber,
                patch_branch:    branch,
                patch_username:  username
              }
            });

            console.log(`Dispatched validate-patch-private.yml — machine: ${machineName}, version: ${currentVersion}`);
